---
openapi: 3.1.0
info:
  title: LogPose REST API
  version: 0.1.0
  description: Versioned REST surface for LogPose metadata, data workflows, and operator actions.
servers:
  - url: http://127.0.0.1:8080
paths:
  /health:
    get:
      summary: Health probe
      operationId: health
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/metadata:
    get:
      summary: Cluster metadata
      operationId: metadata
      responses:
        "200":
          description: Normalized node metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataResponse"
  /v1/runtime/status:
    get:
      summary: Get runtime status
      operationId: getRuntimeStatus
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Control-plane runtime summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeRuntimeStatus"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operator access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal runtime-status failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/databases:
    get:
      summary: List databases
      operationId: listDatabases
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Database descriptors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatabaseDescriptor"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operator access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/databases/{name}:
    get:
      summary: Get a database descriptor
      operationId: getDatabase
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Database descriptor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseDescriptor"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operator access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Database not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Create or replace a database descriptor
      operationId: putDatabase
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatabaseDescriptor"
      responses:
        "200":
          description: Database descriptor written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseDescriptor"
        "400":
          description: Invalid database descriptor or path/body mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operator access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections:
    post:
      summary: Create a collection
      operationId: createCollection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionRequest"
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionDescriptor"
        "400":
          description: Invalid create request or control-plane lifecycle unavailable for the current node role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Collection already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database write permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/databases/{name}/policy:
    get:
      summary: Get a database access policy
      operationId: getDatabasePolicy
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Database access policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseAccessPolicy"
        "404":
          description: Database access policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database owner permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal database policy lookup failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Create or replace a database access policy
      operationId: putDatabasePolicy
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatabaseAccessPolicy"
      responses:
        "200":
          description: Database access policy written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseAccessPolicy"
        "400":
          description: Invalid policy request or control-plane database policy mutations unavailable for the current node role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Database not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database owner permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal database policy persistence failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}:
    get:
      summary: Get collection metadata
      operationId: getCollection
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: database
          in: query
          required: false
          schema:
            type: string
            default: default
      responses:
        "200":
          description: Collection descriptor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionDescriptor"
        "400":
          description: Invalid namespace selection or reconciliation is required before the collection can be served
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database read permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: The requested read barrier is not yet visible on the current serving node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}/placement:
    get:
      summary: Get collection placement
      operationId: getCollectionPlacement
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: database
          in: query
          required: false
          schema:
            type: string
            default: default
      responses:
        "200":
          description: Collection placement summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionPlacement"
        "400":
          description: Invalid namespace selection or reconciliation is required before placement can be resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operator access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal placement lookup failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}/writes:
    post:
      summary: Write a mixed put/delete batch
      operationId: writeCollection
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WriteCollectionRequest"
      responses:
        "200":
          description: Write committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionCommitAck"
        "400":
          description: Invalid write request or data-plane workflow unavailable because the current runtime cannot serve the collection locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database write permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}/query:
    post:
      summary: Execute a planner-controlled vector query
      operationId: queryCollection
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryCollectionRequest"
      responses:
        "200":
          description: Ranked query results with optional planner diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionQueryResponse"
        "400":
          description: Invalid query request or data-plane workflow unavailable because the current runtime cannot serve the collection locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database read permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: The requested read barrier is not yet visible on the current serving node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}/stats:
    get:
      summary: Get collection stats
      operationId: getCollectionStats
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: database
          in: query
          required: false
          schema:
            type: string
            default: default
        - name: snapshot_manifest_generation
          in: query
          required: false
          description: Historical manifest generation to inspect. Must be provided together with `snapshot_visible_seq_no`.
          schema:
            type: integer
        - name: snapshot_visible_seq_no
          in: query
          required: false
          description: Historical visible sequence number to inspect. Must be provided together with `snapshot_manifest_generation`.
          schema:
            type: integer
        - name: read_barrier_manifest_generation
          in: query
          required: false
          description: Lower-bound manifest generation that must already be visible. Must be provided together with `read_barrier_visible_seq_no`. Cannot be combined with the exact snapshot parameters.
          schema:
            type: integer
        - name: read_barrier_visible_seq_no
          in: query
          required: false
          description: Lower-bound visible sequence number that must already be visible. Must be provided together with `read_barrier_manifest_generation`. Cannot be combined with the exact snapshot parameters.
          schema:
            type: integer
      responses:
        "200":
          description: Collection stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionStats"
        "400":
          description: Data-plane workflow unavailable because the current runtime cannot serve the collection locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database read permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}/flush:
    post:
      summary: Flush the mutable delta into a new segment
      operationId: flushCollection
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: database
          in: query
          required: false
          schema:
            type: string
            default: default
      responses:
        "200":
          description: Flush snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionSnapshot"
        "400":
          description: Data-plane workflow unavailable because the current runtime cannot serve the collection locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database write permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}/compact:
    post:
      summary: Compact immutable segments
      operationId: compactCollection
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: database
          in: query
          required: false
          schema:
            type: string
            default: default
      responses:
        "200":
          description: Compaction snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionSnapshot"
        "400":
          description: Data-plane workflow unavailable because the current runtime cannot serve the collection locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database write permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/collections/{name}/inspect:
    get:
      summary: Inspect collection storage state
      operationId: inspectCollection
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: target
          in: query
          required: false
          schema:
            type: string
            enum: [manifest, wal, segment, maintenance]
        - name: database
          in: query
          required: false
          schema:
            type: string
            default: default
        - name: segment_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Inspection report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionInspectReport"
        "400":
          description: Invalid inspect request or data-plane workflow unavailable because the current runtime cannot serve the collection locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Collection or segment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Database read permission required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    DistanceMetric:
      type: string
      enum: [cosine, dot, l2]
    MetadataResponse:
      type: object
      required: [product, node_name, version, git_sha, profile]
      properties:
        product:
          type: string
        node_name:
          type: string
        version:
          type: string
        git_sha:
          type: string
        profile:
          type: string
    NodeRole:
      type: string
      enum: [combined, control, data]
    AuthenticationMode:
      type: string
      enum: [disabled, external_token]
    DatabaseRole:
      type: string
      enum: [owner, read_write, read_only]
    DatabaseRoleBinding:
      type: object
      required:
        - database_name
        - principal_name
        - role
      properties:
        database_name:
          type: string
        principal_name:
          type: string
        role:
          $ref: "#/components/schemas/DatabaseRole"
    DatabaseAccessPolicy:
      type: object
      required:
        - database_name
        - authentication_mode
        - role_bindings
      properties:
        database_name:
          type: string
        authentication_mode:
          $ref: "#/components/schemas/AuthenticationMode"
        role_bindings:
          type: array
          items:
            $ref: "#/components/schemas/DatabaseRoleBinding"
    CollectionPlacement:
      type: object
      required:
        - collection_id
        - database_name
        - collection_name
        - assigned_node
        - assigned_role
        - route_kind
        - route_reason
      properties:
        collection_id:
          type: string
          format: uuid
        database_name:
          type: string
        collection_name:
          type: string
        assigned_node:
          type: string
        assigned_role:
          $ref: "#/components/schemas/NodeRole"
        owner_node:
          type: string
          nullable: true
        ownership_epoch:
          type: integer
          nullable: true
        route_kind:
          type: string
        route_reason:
          type: string
    MaintenanceBacklog:
      type: object
      required:
        - collections_with_pending
        - pending_operations
        - collections_in_progress
        - collections_with_errors
      properties:
        collections_with_pending:
          type: integer
        pending_operations:
          type: integer
        collections_in_progress:
          type: integer
        collections_with_errors:
          type: integer
    CoordinationStatus:
      type: object
      required:
        - cluster_name
        - membership_registered
        - registered_members
        - is_local_leader
      properties:
        cluster_name:
          type: string
        membership_registered:
          type: boolean
        membership_lease_id:
          type: integer
          format: int64
          nullable: true
        registered_members:
          type: array
          items:
            type: string
        leader_node:
          type: string
          nullable: true
        is_local_leader:
          type: boolean
        leadership_lease_id:
          type: integer
          format: int64
          nullable: true
        last_error:
          type: string
          nullable: true
    NodeRuntimeStatus:
      type: object
      required:
        - metadata
        - role
        - rest_endpoint
        - grpc_endpoint
        - storage_engine
        - control_plane_ready
        - data_plane_ready
        - collection_count
        - collections
        - maintenance
      properties:
        metadata:
          $ref: "#/components/schemas/MetadataResponse"
        role:
          $ref: "#/components/schemas/NodeRole"
        rest_endpoint:
          type: string
          description: Configured REST listener address reported by the runtime.
        grpc_endpoint:
          type: string
          description: Configured gRPC listener address reported by the runtime.
        storage_engine:
          type: string
        control_plane_ready:
          type: boolean
          description: Whether control-plane coordination workflows should be considered available on this runtime.
        data_plane_ready:
          type: boolean
          description: Whether data-plane query and mutation workflows are available.
        collection_count:
          type: integer
          description: Number of collections this runtime can currently serve locally.
        collections:
          type: array
          items:
            $ref: "#/components/schemas/CollectionPlacement"
        coordination:
          allOf:
            - $ref: "#/components/schemas/CoordinationStatus"
          nullable: true
        maintenance:
          $ref: "#/components/schemas/MaintenanceBacklog"
    CreateCollectionRequest:
      type: object
      required: [name, dimensions, metric]
      properties:
        database_name:
          type: string
          default: default
        name:
          type: string
        dimensions:
          type: integer
          minimum: 1
        metric:
          $ref: "#/components/schemas/DistanceMetric"
    CollectionDescriptor:
      type: object
      required:
        - collection_id
        - database_name
        - name
        - dimensions
        - metric
        - root_path
        - remote_blob
        - flush_threshold_ops
        - flush_threshold_bytes
        - compaction_threshold_segments
      properties:
        collection_id:
          type: string
          format: uuid
        database_name:
          type: string
        name:
          type: string
        dimensions:
          type: integer
        metric:
          $ref: "#/components/schemas/DistanceMetric"
        root_path:
          type: string
        remote_blob:
          oneOf:
            - type: "null"
            - type: object
              required: [endpoint, bucket, prefix]
              properties:
                endpoint:
                  type: string
                bucket:
                  type: string
                prefix:
                  type: string
        flush_threshold_ops:
          type: integer
        flush_threshold_bytes:
          type: integer
        compaction_threshold_segments:
          type: integer
    DatabaseDescriptor:
      type: object
      required:
        - database_id
        - name
        - is_default
      properties:
        database_id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
    PutOperation:
      type: object
      required: [op, id, vector, metadata]
      properties:
        op:
          type: string
          enum: [put]
        id:
          type: string
        vector:
          type: array
          items:
            type: number
        metadata:
          type: object
    DeleteOperation:
      type: object
      required: [op, id]
      properties:
        op:
          type: string
          enum: [delete]
        id:
          type: string
    WriteOperation:
      oneOf:
        - $ref: "#/components/schemas/PutOperation"
        - $ref: "#/components/schemas/DeleteOperation"
    WriteCollectionRequest:
      type: object
      required: [operations]
      properties:
        database_name:
          type: string
          default: default
        operations:
          type: array
          items:
            $ref: "#/components/schemas/WriteOperation"
    CommitAck:
      type: object
      required: [last_seq_no, applied_ops, snapshot]
      properties:
        last_seq_no:
          type: integer
        applied_ops:
          type: integer
        snapshot:
          $ref: "#/components/schemas/Snapshot"
    Snapshot:
      type: object
      required: [manifest_generation, visible_seq_no]
      properties:
        manifest_generation:
          type: integer
        visible_seq_no:
          type: integer
    ScalarMetadataValue:
      oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: "null"
    PredicateOperator:
      type: string
      enum: [eq, ne, lt, lte, gt, gte, exists, is_null]
    ExplainMode:
      type: string
      enum: [none, plan, profile]
    QueryPlanKind:
      type: string
      enum:
        - unfiltered_exact_scan
        - predicate_first_exact
        - vector_first_exact
        - tiny_population_exact_fallback
        - vector_first_ann
        - cooperative_filtered_ann
        - hybrid_exact_ann_merge
    Predicate:
      oneOf:
        - $ref: "#/components/schemas/AndPredicate"
        - $ref: "#/components/schemas/OrPredicate"
        - $ref: "#/components/schemas/NotPredicate"
        - $ref: "#/components/schemas/ComparisonPredicate"
    AndPredicate:
      type: object
      required: [kind, children]
      properties:
        kind:
          type: string
          const: and
        children:
          type: array
          items:
            $ref: "#/components/schemas/Predicate"
    OrPredicate:
      type: object
      required: [kind, children]
      properties:
        kind:
          type: string
          const: or
        children:
          type: array
          items:
            $ref: "#/components/schemas/Predicate"
    NotPredicate:
      type: object
      required: [kind, child]
      properties:
        kind:
          type: string
          const: not
        child:
          $ref: "#/components/schemas/Predicate"
    ComparisonPredicate:
      type: object
      required: [kind, field, operator]
      properties:
        kind:
          type: string
          const: comparison
        field:
          type: string
        operator:
          $ref: "#/components/schemas/PredicateOperator"
        value:
          $ref: "#/components/schemas/ScalarMetadataValue"
    QueryCollectionRequest:
      type: object
      required: [vector, top_k]
      properties:
        database_name:
          type: string
          default: default
        vector:
          type: array
          items:
            type: number
        top_k:
          type: integer
          minimum: 1
        snapshot:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/Snapshot"
        read_barrier:
          description: Lower-bound snapshot that the server must already satisfy or reject. Cannot be combined with `snapshot`.
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/Snapshot"
        filters:
          type: object
          description: Legacy top-level AND-only equality filters over scalar metadata values.
          additionalProperties:
            $ref: "#/components/schemas/ScalarMetadataValue"
        predicate:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/Predicate"
        explain:
          $ref: "#/components/schemas/ExplainMode"
    QueryMatch:
      type: object
      required: [id, value, metadata]
      properties:
        id:
          type: string
        value:
          type: number
        metadata:
          nullable: true
    QueryStageTimings:
      type: object
      required:
        - planning_micros
        - prefilter_micros
        - candidate_generation_micros
        - postfilter_micros
        - rerank_micros
        - merge_micros
      properties:
        planning_micros:
          type: integer
        prefilter_micros:
          type: integer
        candidate_generation_micros:
          type: integer
        postfilter_micros:
          type: integer
        rerank_micros:
          type: integer
        merge_micros:
          type: integer
    QueryDiagnostics:
      type: object
      required:
        - chosen_plan
        - planner_reason
        - estimated_selectivity
        - units_considered
        - units_pruned
        - units_scanned
        - candidates_before_filter
        - candidates_after_filter
        - candidates_reranked
        - candidates_merged
        - rerank_count
      properties:
        chosen_plan:
          $ref: "#/components/schemas/QueryPlanKind"
        planner_reason:
          type: string
        estimated_selectivity:
          type: number
        units_considered:
          type: integer
        units_pruned:
          type: integer
        units_scanned:
          type: integer
        candidates_before_filter:
          type: integer
        candidates_after_filter:
          type: integer
        candidates_reranked:
          type: integer
        candidates_merged:
          type: integer
        rerank_count:
          type: integer
        fallback_reason:
          oneOf:
            - type: "null"
            - type: string
        unit_scan_mix:
          type: object
          additionalProperties:
            type: integer
        stage_timings:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/QueryStageTimings"
    QueryResponse:
      type: object
      required: [metric, top_k, returned, snapshot, matches]
      properties:
        metric:
          $ref: "#/components/schemas/DistanceMetric"
        top_k:
          type: integer
        returned:
          type: integer
        snapshot:
          $ref: "#/components/schemas/Snapshot"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/QueryMatch"
        diagnostics:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/QueryDiagnostics"
    CollectionContext:
      type: object
      required: [database_name, collection_name]
      properties:
        database_name:
          type: string
        collection_name:
          type: string
    CollectionQueryResponse:
      allOf:
        - $ref: "#/components/schemas/CollectionContext"
        - $ref: "#/components/schemas/QueryResponse"
    MaintenanceStatus:
      type: object
      required: [pending, completed_runs]
      properties:
        pending:
          type: array
          items:
            type: string
        in_progress:
          oneOf:
            - type: "null"
            - type: string
        last_error:
          oneOf:
            - type: "null"
            - type: string
        completed_runs:
          type: integer
    ScalarFieldStats:
      type: object
      required: [present_count, null_count, distinct_count, value_counts]
      properties:
        present_count:
          type: integer
        null_count:
          type: integer
        distinct_count:
          type: integer
        value_counts:
          type: object
          additionalProperties:
            type: integer
        min:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/ScalarMetadataValue"
        max:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/ScalarMetadataValue"
    QueryUnitArtifactStats:
      type: object
      required: [kind, file_name, approx_bytes]
      properties:
        kind:
          type: string
        file_name:
          type: string
        approx_bytes:
          type: integer
    QueryUnitStats:
      type: object
      required:
        - unit_id
        - tier
        - index_kind
        - min_seq_no
        - max_seq_no
        - put_count
        - delete_count
        - approx_bytes
        - scalar_fields
        - artifact_stats
        - component_bytes
      properties:
        unit_id:
          type: string
        tier:
          type: string
        index_kind:
          type: string
        min_seq_no:
          type: integer
        max_seq_no:
          type: integer
        put_count:
          type: integer
        delete_count:
          type: integer
        approx_bytes:
          type: integer
        scalar_fields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ScalarFieldStats"
        artifact_stats:
          type: array
          items:
            $ref: "#/components/schemas/QueryUnitArtifactStats"
        component_bytes:
          type: object
          additionalProperties:
            type: integer
    CollectionStats:
      type: object
      required:
        - collection_id
        - database_name
        - collection_name
        - manifest_generation
        - visible_seq_no
        - mutable_op_count
        - segment_count
        - live_record_count
        - deleted_record_count
        - maintenance
        - query_units
      properties:
        collection_id:
          type: string
          format: uuid
        database_name:
          type: string
        collection_name:
          type: string
        manifest_generation:
          type: integer
        visible_seq_no:
          type: integer
        mutable_op_count:
          type: integer
        segment_count:
          type: integer
        live_record_count:
          type: integer
        deleted_record_count:
          type: integer
        maintenance:
          $ref: "#/components/schemas/MaintenanceStatus"
        query_units:
          type: array
          items:
            $ref: "#/components/schemas/QueryUnitStats"
    InspectReport:
      type: object
      required: [target, payload]
      properties:
        target:
          type: string
        payload:
          nullable: true
    CollectionCommitAck:
      allOf:
        - $ref: "#/components/schemas/CollectionContext"
        - $ref: "#/components/schemas/CommitAck"
    CollectionSnapshot:
      allOf:
        - $ref: "#/components/schemas/CollectionContext"
        - $ref: "#/components/schemas/Snapshot"
    CollectionInspectReport:
      allOf:
        - $ref: "#/components/schemas/CollectionContext"
        - $ref: "#/components/schemas/InspectReport"
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
