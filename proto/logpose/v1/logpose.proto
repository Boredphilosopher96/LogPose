syntax = "proto3";

package logpose.v1;

service LogPoseService {
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataReply);
  rpc GetRuntimeStatus(GetRuntimeStatusRequest) returns (GetRuntimeStatusReply);
  rpc CreateCollection(CreateCollectionRequest) returns (CollectionDescriptorReply);
  rpc GetCollection(GetCollectionRequest) returns (CollectionDescriptorReply);
  rpc GetCollectionPlacement(GetCollectionPlacementRequest) returns (CollectionPlacementReply);
  rpc WriteCollection(WriteCollectionRequest) returns (CommitAckReply);
  rpc QueryCollection(QueryCollectionRequest) returns (QueryCollectionReply);
  rpc GetCollectionStats(GetCollectionStatsRequest) returns (CollectionStatsReply);
  rpc FlushCollection(FlushCollectionRequest) returns (SnapshotReply);
  rpc CompactCollection(CompactCollectionRequest) returns (SnapshotReply);
  rpc InspectCollection(InspectCollectionRequest) returns (InspectCollectionReply);
}

message GetMetadataRequest {}

message GetMetadataReply {
  string product = 1;
  string node_name = 2;
  string version = 3;
  string git_sha = 4;
  string profile = 5;
}

message GetRuntimeStatusRequest {}

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_COMBINED = 1;
  NODE_ROLE_CONTROL = 2;
  NODE_ROLE_DATA = 3;
}

message MaintenanceBacklogReply {
  uint64 collections_with_pending = 1;
  uint64 pending_operations = 2;
  uint64 collections_in_progress = 3;
  uint64 collections_with_errors = 4;
}

message CollectionPlacementReply {
  string collection_id = 1;
  string collection_name = 2;
  string assigned_node = 3;
  NodeRole assigned_role = 4;
  string route_kind = 5;
  string route_reason = 6;
  string tenant_name = 7;
  string database_name = 8;
}

message GetRuntimeStatusReply {
  GetMetadataReply metadata = 1;
  NodeRole role = 2;
  string rest_endpoint = 3;
  string grpc_endpoint = 4;
  string storage_engine = 5;
  bool control_plane_ready = 6;
  bool data_plane_ready = 7;
  uint64 collection_count = 8;
  repeated CollectionPlacementReply collections = 9;
  MaintenanceBacklogReply maintenance = 10;
}

message RemoteBlobConfig {
  string endpoint = 1;
  string bucket = 2;
  string prefix = 3;
}

enum DistanceMetric {
  DISTANCE_METRIC_UNSPECIFIED = 0;
  DISTANCE_METRIC_COSINE = 1;
  DISTANCE_METRIC_DOT = 2;
  DISTANCE_METRIC_L2 = 3;
}

message CreateCollectionRequest {
  string name = 1;
  uint64 dimensions = 2;
  DistanceMetric metric = 3;
  string tenant_name = 4;
  string database_name = 5;
}

message GetCollectionRequest {
  string collection_name = 1;
  string tenant_name = 2;
  string database_name = 3;
}

message GetCollectionPlacementRequest {
  string collection_name = 1;
  string tenant_name = 2;
  string database_name = 3;
}

message CollectionDescriptorReply {
  string collection_id = 1;
  string name = 2;
  uint64 dimensions = 3;
  DistanceMetric metric = 4;
  string root_path = 5;
  uint64 flush_threshold_ops = 6;
  uint64 flush_threshold_bytes = 7;
  uint64 compaction_threshold_segments = 8;
  RemoteBlobConfig remote_blob = 9;
  string database_name = 10;
  string tenant_name = 11;
}

message PutRecord {
  string id = 1;
  repeated float vector = 2;
  string metadata_json = 3;
}

message DeleteRecord {
  string id = 1;
}

message WriteOperation {
  oneof operation {
    PutRecord put = 1;
    DeleteRecord delete = 2;
  }
}

message WriteCollectionRequest {
  string collection_name = 1;
  repeated WriteOperation operations = 2;
  string tenant_name = 3;
  string database_name = 4;
}

message CommitAckReply {
  uint64 last_seq_no = 1;
  uint64 applied_ops = 2;
  string tenant_name = 3;
  string database_name = 4;
  string collection_name = 5;
}

message Snapshot {
  uint64 manifest_generation = 1;
  uint64 visible_seq_no = 2;
}

message SnapshotReply {
  uint64 manifest_generation = 1;
  uint64 visible_seq_no = 2;
  string tenant_name = 3;
  string database_name = 4;
  string collection_name = 5;
}

message ScalarValue {
  oneof kind {
    string string_value = 1;
    int64 int64_value = 2;
    uint64 uint64_value = 3;
    double double_value = 4;
    bool bool_value = 5;
    bool null_value = 6;
  }
}

message MetadataFilter {
  string field = 1;
  ScalarValue value = 2;
}

enum PredicateOperator {
  PREDICATE_OPERATOR_UNSPECIFIED = 0;
  PREDICATE_OPERATOR_EQ = 1;
  PREDICATE_OPERATOR_NE = 2;
  PREDICATE_OPERATOR_LT = 3;
  PREDICATE_OPERATOR_LTE = 4;
  PREDICATE_OPERATOR_GT = 5;
  PREDICATE_OPERATOR_GTE = 6;
  PREDICATE_OPERATOR_EXISTS = 7;
  PREDICATE_OPERATOR_IS_NULL = 8;
}

message PredicateComparison {
  string field = 1;
  PredicateOperator operator = 2;
  ScalarValue value = 3;
}

message PredicateList {
  repeated Predicate children = 1;
}

message PredicateNot {
  Predicate child = 1;
}

message Predicate {
  oneof node {
    PredicateList and = 1;
    PredicateList or = 2;
    PredicateNot not = 3;
    PredicateComparison comparison = 4;
  }
}

enum ExplainMode {
  EXPLAIN_MODE_NONE = 0;
  EXPLAIN_MODE_PLAN = 1;
  EXPLAIN_MODE_PROFILE = 2;
}

message QueryCollectionRequest {
  string collection_name = 1;
  repeated float vector = 2;
  uint64 top_k = 3;
  Snapshot snapshot = 4;
  repeated MetadataFilter filters = 5;
  Predicate predicate = 6;
  ExplainMode explain = 7;
  string tenant_name = 8;
  string database_name = 9;
}

message QueryMatch {
  string id = 1;
  float value = 2;
  string metadata_json = 3;
}

enum QueryPlanKind {
  QUERY_PLAN_KIND_UNSPECIFIED = 0;
  QUERY_PLAN_KIND_UNFILTERED_EXACT_SCAN = 1;
  QUERY_PLAN_KIND_PREDICATE_FIRST_EXACT = 2;
  QUERY_PLAN_KIND_VECTOR_FIRST_EXACT = 3;
  QUERY_PLAN_KIND_TINY_POPULATION_EXACT_FALLBACK = 4;
  QUERY_PLAN_KIND_VECTOR_FIRST_ANN = 5;
  QUERY_PLAN_KIND_COOPERATIVE_FILTERED_ANN = 6;
  QUERY_PLAN_KIND_HYBRID_EXACT_ANN_MERGE = 7;
}

message QueryStageTimings {
  uint64 planning_micros = 1;
  uint64 prefilter_micros = 2;
  uint64 candidate_generation_micros = 3;
  uint64 postfilter_micros = 4;
  uint64 rerank_micros = 5;
  uint64 merge_micros = 6;
}

message QueryDiagnostics {
  QueryPlanKind chosen_plan = 1;
  string planner_reason = 2;
  float estimated_selectivity = 3;
  uint64 units_considered = 4;
  uint64 units_pruned = 5;
  uint64 units_scanned = 6;
  uint64 candidates_before_filter = 7;
  uint64 candidates_after_filter = 8;
  uint64 candidates_reranked = 9;
  uint64 candidates_merged = 10;
  uint64 rerank_count = 11;
  optional string fallback_reason = 12;
  map<string, uint64> unit_scan_mix = 13;
  QueryStageTimings stage_timings = 14;
}

message QueryCollectionReply {
  DistanceMetric metric = 1;
  uint64 top_k = 2;
  uint64 returned = 3;
  Snapshot snapshot = 4;
  repeated QueryMatch matches = 5;
  QueryDiagnostics diagnostics = 6;
  string tenant_name = 7;
  string database_name = 8;
  string collection_name = 9;
}

message GetCollectionStatsRequest {
  string collection_name = 1;
  string tenant_name = 2;
  string database_name = 3;
}

message CollectionStatsReply {
  string collection_id = 1;
  string collection_name = 2;
  uint64 manifest_generation = 3;
  uint64 visible_seq_no = 4;
  uint64 mutable_op_count = 5;
  uint64 segment_count = 6;
  uint64 live_record_count = 7;
  uint64 deleted_record_count = 8;
  MaintenanceStatus maintenance = 9;
  repeated QueryUnitStats query_units = 10;
  string tenant_name = 11;
  string database_name = 12;
}

message FlushCollectionRequest {
  string collection_name = 1;
  string tenant_name = 2;
  string database_name = 3;
}

message CompactCollectionRequest {
  string collection_name = 1;
  string tenant_name = 2;
  string database_name = 3;
}

enum InspectTarget {
  INSPECT_TARGET_MANIFEST = 0;
  INSPECT_TARGET_WAL = 1;
  INSPECT_TARGET_SEGMENT = 2;
  INSPECT_TARGET_MAINTENANCE = 3;
}

message InspectCollectionRequest {
  string collection_name = 1;
  InspectTarget target = 2;
  string segment_id = 3;
  string tenant_name = 4;
  string database_name = 5;
}

message InspectCollectionReply {
  string target = 1;
  string payload_json = 2;
  string tenant_name = 3;
  string database_name = 4;
  string collection_name = 5;
}

message MaintenanceStatus {
  repeated string pending = 1;
  optional string in_progress = 2;
  optional string last_error = 3;
  uint64 completed_runs = 4;
}

message ScalarFieldStats {
  uint64 present_count = 1;
  uint64 null_count = 2;
  map<string, uint64> value_counts = 3;
  ScalarValue min = 4;
  ScalarValue max = 5;
  uint64 distinct_count = 6;
}

message QueryUnitArtifactStats {
  string kind = 1;
  string file_name = 2;
  uint64 approx_bytes = 3;
}

message QueryUnitStats {
  string unit_id = 1;
  string tier = 2;
  string index_kind = 3;
  uint64 min_seq_no = 4;
  uint64 max_seq_no = 5;
  uint64 put_count = 6;
  uint64 delete_count = 7;
  uint64 approx_bytes = 8;
  map<string, ScalarFieldStats> scalar_fields = 9;
  repeated QueryUnitArtifactStats artifact_stats = 10;
  map<string, uint64> component_bytes = 11;
}
