---
name: Rust Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace -- --skip randomized_storage_scenarios_match_the_expected_model
