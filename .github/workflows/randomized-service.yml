---
name: Randomized Service

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  randomized-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run randomized service harness
        run: cargo test -p logpose-service --test randomized_service
